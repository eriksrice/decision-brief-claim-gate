name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile source and tests
        run: python -m compileall src tests

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run demo
        run: ./scripts/demo.sh

